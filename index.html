<!DOCTYPE html>
<html lang="ja" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>品川シーサイド 発車標</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+JP:wght@400;700;900&display=swap');

:root {
  --bg:#ffffff; --bg2:#fafafa; --border:#e8e8e8;
  --text:#111; --text-mid:#888; --text-dim:#bbb;
  --next-bg:#f4f8ff; --bar:#1a6bff;
  --btn-bg:#fff; --btn-act:#f0f5ff; --btn-bdr:#e0e0e0; --btn-abdr:#1a6bff;
  --sok-bg:#f0faf4; --sok:#1a7a40;
  --serr-bg:#fff0f0; --serr:#cc2020;
  --sidle-bg:#f5f5f5; --sidle:#999;
}
[data-theme="dark"] {
  --bg:#0a0d14; --bg2:#0d1120; --border:#1e2a3a;
  --text:#e4eeff; --text-mid:#6a8aaa; --text-dim:#2a3a50;
  --next-bg:#0e1628; --bar:#2a7aff;
  --btn-bg:#0d1120; --btn-act:#0e1e3a; --btn-bdr:#1e2a3a; --btn-abdr:#2a7aff;
  --sok-bg:#071510; --sok:#40d870;
  --serr-bg:#180808; --serr:#ff6060;
  --sidle-bg:#0d1120; --sidle:#445566;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { width:100%; height:100%; background:var(--bg); font-family:'Noto Sans JP',sans-serif; overflow:hidden; color:var(--text); transition:background .3s,color .3s; }

.app {
  width:100%; height:100%; display:flex; flex-direction:column;
  padding:env(safe-area-inset-top,0) env(safe-area-inset-right,0) env(safe-area-inset-bottom,0) env(safe-area-inset-left,0);
}

/* STATUS */
.sbar { flex-shrink:0; display:flex; align-items:center; gap:8px; padding:7px 16px; min-height:36px; border-bottom:1px solid var(--border); transition:background .4s; }
.sbar.ok    { background:var(--sok-bg); }
.sbar.delay { background:var(--serr-bg); animation:flash 2s ease-in-out infinite; }
.sbar.idle  { background:var(--sidle-bg); }
@keyframes flash { 0%,100%{opacity:1} 50%{opacity:.7} }
.sdot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.ok   .sdot { background:var(--sok); }
.delay .sdot { background:var(--serr); animation:blink 1s ease-in-out infinite; }
.idle .sdot  { background:var(--sidle); }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.15} }
.stxt { flex:1; font-size:12px; letter-spacing:.04em; }
.ok   .stxt { color:var(--sok); }
.delay .stxt { color:var(--serr); font-weight:700; }
.idle .stxt  { color:var(--sidle); }
.stim { font-size:10px; color:var(--text-dim); white-space:nowrap; }

/* CLOCK */
.clock-wrap { flex-shrink:0; display:flex; align-items:center; justify-content:center; gap:20px; padding:12px 20px 10px; border-bottom:1px solid var(--border); }
.clock-main { font-family:'Share Tech Mono',monospace; font-size:clamp(52px,12vw,88px); letter-spacing:.06em; line-height:1; }
.csec { color:var(--text-dim); }
.clock-meta { display:flex; flex-direction:column; gap:5px; }
.cdate { font-size:12px; color:var(--text-mid); letter-spacing:.05em; }
.theme-btn { background:var(--btn-bg); border:1px solid var(--btn-bdr); border-radius:20px; padding:5px 12px; font-size:12px; font-weight:700; color:var(--text-mid); cursor:pointer; }

/* TRAIN LIST
   핵심: 스크롤 가능하지만 각 행의 높이는 컨테이너 1/3로 고정 */
.train-list {
  flex:1;
  overflow-y:auto;
  overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
  /* CSS custom property로 행 높이를 JS에서 설정 */
}
.train-list::-webkit-scrollbar { display:none; }

.train-row {
  /* height는 JS で --row-h をセット */
  height: var(--row-h, 33.333vh);
  display:flex; align-items:center;
  padding:0 24px; gap:14px;
  border-bottom:1px solid var(--border);
  background:var(--bg);
  position:relative;
  flex-shrink:0; /* スクロール時に縮まない */
}
.train-row.is-next { background:var(--next-bg); }
.train-row.is-next::before { content:''; position:absolute; left:0; top:0; bottom:0; width:4px; background:var(--bar); }
.train-row.entering { animation:slideIn .3s ease-out; }
@keyframes slideIn { from{transform:translateY(40px);opacity:0} to{transform:translateY(0);opacity:1} }

/* BADGE */
.badge-col { width:76px; flex-shrink:0; display:flex; flex-direction:column; gap:6px; }
.badge { display:inline-flex; align-items:center; justify-content:center; padding:4px 9px; border-radius:5px; font-size:12px; font-weight:700; letter-spacing:.05em; white-space:nowrap; }
[data-theme="light"] .local   { background:#fff3e0; color:#e65c00; border:1px solid #ffd0a0; }
[data-theme="light"] .rapid   { background:#e8f0ff; color:#1a4fd6; border:1px solid #b0c8ff; }
[data-theme="light"] .tkinkai { background:#e8fff3; color:#0a7a3a; border:1px solid #90e0b0; }
[data-theme="dark"]  .local   { background:rgba(255,140,0,.12); color:#ffaa40; border:1px solid rgba(255,140,0,.3); }
[data-theme="dark"]  .rapid   { background:rgba(42,122,255,.15); color:#6aabff; border:1px solid rgba(42,122,255,.4); }
[data-theme="dark"]  .tkinkai { background:rgba(0,200,100,.1);  color:#40d880; border:1px solid rgba(0,200,100,.3); }
.seq { font-size:11px; color:var(--text-dim); font-family:'Share Tech Mono',monospace; }
.is-next .seq { color:var(--bar); }

/* DEST */
.dest-col { flex:1; display:flex; flex-direction:column; gap:3px; min-width:0; }
.dest-ja { font-size:clamp(26px,5.5vw,44px); font-weight:900; line-height:1; letter-spacing:.02em; white-space:nowrap; }
.dest-via { font-size:11px; color:var(--text-dim); }

/* TIME + COUNTDOWN */
.time-col { display:flex; flex-direction:column; align-items:flex-end; gap:5px; flex-shrink:0; }
.dep-time { font-family:'Share Tech Mono',monospace; font-size:clamp(34px,6.5vw,54px); letter-spacing:.06em; line-height:1; }
.is-next .dep-time { color:var(--bar); }
.countdown { font-size:13px; font-family:'Share Tech Mono',monospace; padding:3px 12px; border-radius:20px; white-space:nowrap; font-weight:700; }
[data-theme="light"] .cd-s { background:#fff0f0; color:#cc2020; border:1px solid #ffb0b0; }
[data-theme="light"] .cd-n { background:#fffbee; color:#aa7700; border:1px solid #ffd060; }
[data-theme="light"] .cd-o { background:#f0fff6; color:#1a7a40; border:1px solid #80e0a0; }
[data-theme="dark"]  .cd-s { background:rgba(255,59,59,.12); color:#ff7070; border:1px solid rgba(255,59,59,.35); }
[data-theme="dark"]  .cd-n { background:rgba(255,200,50,.08); color:#f5c842; border:1px solid rgba(255,200,50,.3); }
[data-theme="dark"]  .cd-o { background:rgba(0,200,83,.08);  color:#40d880; border:1px solid rgba(0,200,83,.25); }
.cd-s { animation:pls 1s ease-in-out infinite; }
@keyframes pls { 0%,100%{opacity:1} 50%{opacity:.35} }

/* DIR BUTTONS */
.dir-section { flex-shrink:0; display:flex; gap:10px; padding:10px 16px; padding-bottom:max(10px,env(safe-area-inset-bottom)); border-top:1px solid var(--border); background:var(--bg2); }
.dir-btn { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; padding:12px 10px; border-radius:12px; border:2px solid var(--btn-bdr); background:var(--btn-bg); cursor:pointer; transition:all .2s; }
.dir-btn.active { border-color:var(--btn-abdr); background:var(--btn-act); }
.darrow { font-size:20px; color:var(--text-dim); }
.dir-btn.active .darrow { color:var(--bar); }
.dlabel { font-size:14px; font-weight:700; color:var(--text-mid); }
.dir-btn.active .dlabel { color:var(--text); }
.dsub { font-size:10px; color:var(--text-dim); }
.pill { font-family:'Share Tech Mono',monospace; font-size:10px; padding:2px 7px; border-radius:10px; background:var(--bg2); color:var(--text-dim); border:1px solid var(--border); }
.dir-btn.active .pill { color:var(--bar); border-color:var(--btn-abdr); }
</style>
</head>

<div class="app">

  <div class="sbar idle" id="sbar">
    <div class="sdot"></div>

    <div class="stim" id="stim"></div>

    <div class="clock-meta">
      <div class="cdate" id="cdate">---</div>

  </div>

  <div class="dir-section">

function nowS(){const n=new Date();return n.getHours()*3600+n.getMinutes()*60+n.getSeconds();}
function getTT(){return dir===0?UP_WD:(isWD()?DOWN_WD:DOWN_HD);}

// 全便を秒単位で取得（倒計时に使う）
function getFlat(){
  return getTT().map(t=>({
    min:t[0]*60+t[1], sec:t[0]*3600+t[1]*60,
    h:t[0],m:t[1],type:t[2],dest:t[3]
  }));
}

// 次の3便以降すべて返す（スクロール用）
function getTrains(){
  const now=nowM();
  const flat=getFlat();
  let i=flat.findIndex(t=>t.min>=now);
  if(i<0)i=0;
  return flat.slice(i).concat(flat.slice(0,i)).map((t,k)=>({...t,offset:k}));
}

// 秒単位の倒計时
function cdSec(depSec){
  const now=nowS();
  let d=depSec-now;
  if(d<0)d+=24*3600;
  if(d===0)   return{t:'発車中',    c:'cd-s'};
  if(d<60)    return{t:`0:${String(d).padStart(2,'0')}`,c:'cd-s'};
  const m=Math.floor(d/60), s=d%60;
  if(m<=3)    return{t:`${m}:${String(s).padStart(2,'0')}`,c:'cd-s'};
  if(m<=8)    return{t:`あと ${m} 分`,c:'cd-n'};
  return          {t:`あと ${m} 分`,c:'cd-o'};
}

function badgeCls(t){return t==='各停'?'local':t==='通快'?'tkinkai':'rapid';}

// ── 行の高さを計算してCSS変数にセット ────────────────────────
function setRowHeight(){
  const listEl=document.getElementById('tlist');
  const h=listEl.clientHeight;
  const rowH=Math.floor(h/3);
  listEl.style.setProperty('--row-h', rowH+'px');
}

// ── 全便を描画（初回 or 方向切替時のみ）─────────────────────
let prevNextIdx=-1;

function renderAll(){
  const trains=getTrains();
  const list=document.getElementById('tlist');
  list.innerHTML=trains.map((t,i)=>{
    const hh=String(t.h).padStart(2,'0'),mm=String(t.m).padStart(2,'0');
    const isNext=i===0;
    const cd=cdSec(t.sec);
    const seq=isNext?'次の列車':`${i+1}本後`;
    return`<div class="train-row${isNext?' is-next':''}" id="row-${i}">
      <div class="badge-col">
        <span class="badge ${badgeCls(t.type)}">${t.type}</span>
        <span class="seq">${seq}</span>
      </div>
      <div class="dest-col">
        <div class="dest-ja">${t.dest}</div>
        <div class="dest-via">${VIA[t.dest]||''}</div>
      </div>
      <div class="time-col">
        <div class="dep-time">${hh}:${mm}</div>
        <div class="countdown ${cd.c}" id="cd-${i}">${cd.t}</div>
      </div>
    </div>`;
  }).join('');
  // 先頭行へスクロール
  list.scrollTop=0;
  prevNextIdx=0;
}

// ── 毎秒: カウントダウンのみ更新（DOM再生成なし）────────────
let lastMin=-1;

function tickSecond(){
  const now=nowM();

  // 分が変わったら → 次の列車が変わる可能性 → 全再描画
  if(now!==lastMin){
    lastMin=now;
    const trains=getTrains();
    // 次の列車インデックスをチェック
    const list=document.getElementById('tlist');
    const rows=list.querySelectorAll('.train-row');
    if(rows.length && trains.length){
      // is-next を更新
      rows.forEach((r,i)=>{
        const isNext=i===0;
        r.classList.toggle('is-next',isNext);
        const seq=r.querySelector('.seq');
        if(seq) seq.textContent=isNext?'次の列車':`${i+1}本後`;
      });
      // 1本目が発車済みになっていたら全再描画
      const firstTrain=trains[0];
      if(firstTrain && firstTrain.min<now){
        renderAll();
        return;
      }
    }
  }

  // カウントダウンを全行更新（毎秒）
  const trains=getTrains();
  trains.forEach((t,i)=>{
    const el=document.getElementById(`cd-${i}`);
    if(!el)return;
    const cd=cdSec(t.sec);
    el.textContent=cd.t;
    el.className=`countdown ${cd.c}`;
  });
}

// ── 時計 ────────────────────────────────────────
function updateClock(){
  const n=new Date();
  document.getElementById('chm').textContent=`${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;
  document.getElementById('cs').textContent=`:${String(n.getSeconds()).padStart(2,'0')}`;
  const days=['日','月','火','水','木','金','土'];
  document.getElementById('cdate').textContent=`${n.getFullYear()}.${String(n.getMonth()+1).padStart(2,'0')}.${String(n.getDate()).padStart(2,'0')} ${days[n.getDay()]} ${isWD()?'平日':'土休日'}`;
}

// ── テーマ ───────────────────────────────────────
function toggleTheme(){
  const isDark=document.documentElement.dataset.theme==='dark';
  document.documentElement.dataset.theme=isDark?'light':'dark';
  document.getElementById('tbtn').textContent=isDark?'🌙 夜間':'☀️ 昼間';
}

// ── 方向切替 ─────────────────────────────────────
function setDir(d){
  if(dir===d)return;
  dir=d; lastMin=-1;
  document.getElementById('btnUp').classList.toggle('active',d===0);
  document.getElementById('btnDown').classList.toggle('active',d===1);
  renderAll();
}

// ── 運行情報 ─────────────────────────────────────
const INFO_URL='https://service.twr.co.jp/rinkai/public/information?lang=ja';
const PROXIES=[
  u=>`https://corsproxy.io/?${encodeURIComponent(u)}`,
  u=>`https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
  u=>`https://thingproxy.freeboard.io/fetch/${u}`,
];
async function fetchStatus(){
  const bar=document.getElementById('sbar');
  const txt=document.getElementById('stxt');
  const tim=document.getElementById('stim');
  for(const mk of PROXIES){
    try{
      const res=await fetch(mk(INFO_URL),{cache:'no-store',signal:AbortSignal.timeout(6000)});
      if(!res.ok)continue;
      const html=await res.text();
      if(html.length<100)continue;
      const isNormal=html.includes('平常通り');
      const isDelay=['遅れ','遅延','中止','見合わせ','運休'].some(w=>html.includes(w));
      const tmp=document.createElement('div');
      tmp.innerHTML=html;
      const h1=tmp.querySelector('h1');
      let msg='';
      if(h1){let el=h1.nextElementSibling,c=0;while(el&&c<6){const t=el.textContent.trim().replace(/\s+/g,' ');if(t.length>3&&!t.startsWith('■')&&!t.includes('注意')&&!/^\d{4}年/.test(t)){msg=t;break;}el=el.nextElementSibling;c++;}}
      if(!msg)msg=isNormal?'平常通り運転しています。':'運行情報を確認してください';
      bar.className='sbar '+(isDelay?'delay':isNormal?'ok':'idle');
      txt.textContent=msg.slice(0,80);
      const n=new Date();
      tim.textContent=`${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')} 更新`;
      return;
    }catch{continue;}
  }
  bar.className='sbar idle';
  txt.textContent='運行情報取得エラー — service.twr.co.jp を直接確認';
  tim.textContent='';
}

// ── スワイプ ─────────────────────────────────────
let tx=0;
const tl=document.getElementById('tlist');
tl.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;},{passive:true});
tl.addEventListener('touchend',e=>{if(Math.abs(e.changedTouches[0].clientX-tx)>60)setDir(dir===0?1:0);},{passive:true});

// ── リサイズ対応 ──────────────────────────────────
window.addEventListener('resize',setRowHeight);

// ── 初期化 ────────────────────────────────────────
setRowHeight();
renderAll();
updateClock();
fetchStatus();

setInterval(()=>{updateClock();tickSecond();},1000);
setInterval(fetchStatus,60000);
</script>
