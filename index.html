<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>品川シーサイド 発車標</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+JP:wght@300;400;700;900&display=swap');

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html, body {
  width:100%; height:100%;
  background:#fff;
  font-family:'Noto Sans JP', sans-serif;
  overflow:hidden;
  color:#111;
}

.app {
  width:100%; height:100%;
  display:flex;
  flex-direction:column;
  padding: env(safe-area-inset-top,0) env(safe-area-inset-right,0)
           env(safe-area-inset-bottom,0) env(safe-area-inset-left,0);
}

/* ── STATUS BANNER ─────────────────────────────── */
.status-banner {
  flex-shrink:0;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  padding:6px 20px;
  font-size:13px;
  letter-spacing:0.04em;
  transition: background 0.5s, color 0.5s;
  min-height:36px;
}
.status-banner.normal  { background:#f0faf4; color:#1a7a40; }
.status-banner.delay   { background:#fff0f0; color:#cc2020; font-weight:700; animation:flash-banner 2s ease-in-out infinite; }
.status-banner.loading { background:#f5f5f5; color:#999; }
@keyframes flash-banner { 0%,100%{background:#fff0f0} 50%{background:#ffe0e0} }

.status-dot {
  width:8px; height:8px; border-radius:50%; flex-shrink:0;
}
.normal  .status-dot { background:#1a7a40; }
.delay   .status-dot { background:#cc2020; animation:blink 1s ease-in-out infinite; }
.loading .status-dot { background:#ccc; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

.status-text { flex:1; text-align:center; }
.status-time { font-size:11px; opacity:0.6; white-space:nowrap; }

/* ── CLOCK ─────────────────────────────────────── */
.clock-section {
  flex-shrink:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding: 14px 0 10px;
  border-bottom: 1px solid #e8e8e8;
}
.clock-main {
  font-family:'Share Tech Mono', monospace;
  font-size: clamp(60px, 14vw, 96px);
  font-weight:400;
  letter-spacing:0.06em;
  color:#111;
  line-height:1;
}
.clock-sec {
  color:#aaa;
}
.clock-date {
  font-size:13px;
  color:#888;
  margin-top:4px;
  letter-spacing:0.06em;
}

/* ── TRAIN LIST ─────────────────────────────────── */
.train-list {
  flex:1;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

.train-row {
  flex:1;
  display:flex;
  align-items:center;
  padding: 0 28px;
  gap:16px;
  border-bottom:1px solid #ebebeb;
  background:#fff;
  transition: background 0.2s;
  position:relative;
}
.train-row:last-child { border-bottom:none; }
.train-row.next { background:#f7f9ff; }
.train-row.next::before {
  content:'';
  position:absolute; left:0; top:0; bottom:0; width:4px;
  background:#1a6bff;
}

/* 列車種別バッジ */
.badge-col { width:80px; flex-shrink:0; }
.badge {
  display:inline-flex; align-items:center; justify-content:center;
  padding:5px 10px; border-radius:5px;
  font-size:13px; font-weight:700; letter-spacing:0.05em;
  white-space:nowrap;
}
.local { background:#fff3e0; color:#e65c00; border:1px solid #ffd0a0; }
.rapid { background:#e8f0ff; color:#1a4fd6; border:1px solid #b0c8ff; }
.tkinkai{ background:#e8fff3; color:#0a7a3a; border:1px solid #90e0b0; }

/* 行先 */
.dest-col { flex:1; display:flex; flex-direction:column; gap:3px; }
.dest-ja {
  font-size: clamp(28px, 5.5vw, 44px);
  font-weight:900;
  color:#111;
  line-height:1;
  letter-spacing:0.02em;
}
.dest-via { font-size:12px; color:#aaa; letter-spacing:0.04em; }

/* 時刻・カウントダウン */
.time-col { display:flex; flex-direction:column; align-items:flex-end; gap:5px; }
.dep-time {
  font-family:'Share Tech Mono', monospace;
  font-size: clamp(38px, 7vw, 56px);
  color:#111;
  letter-spacing:0.06em;
  line-height:1;
}
.train-row.next .dep-time { color:#1a6bff; }

.countdown {
  font-size:13px; font-family:'Share Tech Mono', monospace;
  padding:3px 10px; border-radius:4px; white-space:nowrap;
}
.cd-soon { background:#fff0f0; color:#cc2020; border:1px solid #ffb0b0; animation:pulse-cd 1s ease-in-out infinite; }
.cd-near { background:#fffbee; color:#aa7700; border:1px solid #ffd060; }
.cd-ok   { background:#f0fff6; color:#1a7a40; border:1px solid #80e0a0; }
@keyframes pulse-cd { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* ── DIRECTION BUTTONS ──────────────────────────── */
.dir-section {
  flex-shrink:0;
  display:flex;
  gap:12px;
  padding:12px 20px;
  padding-bottom: max(12px, env(safe-area-inset-bottom));
  border-top:1px solid #e8e8e8;
  background:#fafafa;
}
.dir-btn {
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:4px;
  padding:14px 10px;
  border-radius:12px;
  border:2px solid #e0e0e0;
  background:#fff;
  cursor:pointer;
  transition: all 0.2s;
}
.dir-btn.active {
  border-color:#1a6bff;
  background:#f0f5ff;
}
.dir-btn-arrow {
  font-size:22px;
  color:#bbb;
  transition:color 0.2s;
}
.dir-btn.active .dir-btn-arrow { color:#1a6bff; }
.dir-btn-label {
  font-size:14px; font-weight:700;
  color:#888;
  letter-spacing:0.03em;
  transition:color 0.2s;
}
.dir-btn.active .dir-btn-label { color:#1a4fd6; }
.dir-btn-sub {
  font-size:10px; color:#bbb; letter-spacing:0.04em;
}
.dir-btn.active .dir-btn-sub { color:#7090cc; }
.platform-pill {
  font-family:'Share Tech Mono', monospace;
  font-size:10px;
  padding:2px 7px; border-radius:10px;
  background:#f0f0f0; color:#888;
  border:1px solid #e0e0e0;
  transition: all 0.2s;
}
.dir-btn.active .platform-pill {
  background:#ddeaff; color:#1a4fd6; border-color:#b0c8ff;
}

/* ── TRANSITION ─────────────────────────────────── */
.train-list { transition:opacity 0.18s; }
.train-list.fade { opacity:0; }
</style>
</head>
<body>
<div class="app">

  <!-- STATUS -->
  <div class="status-banner loading" id="statusBar">
    <div class="status-dot"></div>
    <div class="status-text" id="statusText">運行情報取得中…</div>
    <div class="status-time" id="statusTime"></div>

  <div class="clock-section">
    <div class="clock-main">
      <span id="clockHM">--:--</span><span class="clock-sec" id="clockS">:--</span>
    </div>
    <div class="clock-date" id="clockDate">---</div>
  </div>

  <!-- TRAINS -->
  <div class="train-list" id="trainList"></div>

  <!-- DIR BUTTONS -->
  <div class="dir-section">
    <button class="dir-btn active" id="btnUp" onclick="setDir(0)">
      <div class="dir-btn-arrow">↑</div>
      <div class="dir-btn-label">大崎方向</div>

  '大崎':'りんかい線内',

// ── ロジック ────────────────────────────────────
let dir = 0;
function isWD(){ const d=new Date().getDay(); return d!==0&&d!==6; }
function nowM(){ const n=new Date(); return n.getHours()*60+n.getMinutes(); }

function getNext(tt){
  const now=nowM();
  const f=tt.map(t=>({min:t[0]*60+t[1],h:t[0],m:t[1],type:t[2],dest:t[3]}));
  let u=f.filter(t=>t.min>=now);
  if(u.length<3){const w=f.filter(t=>t.min<now).map(t=>({...t,min:t.min+24*60}));u=[...u,...w];}
  return u.slice(0,3);
}

function cdInfo(dep){
  const d=dep-nowM();
  if(d<=0) return{t:'発車中',c:'cd-soon'};
  if(d===1) return{t:'まもなく',c:'cd-soon'};
  if(d<=3) return{t:`あと ${d} 分`,c:'cd-soon'};
  if(d<=8) return{t:`あと ${d} 分`,c:'cd-near'};
  return{t:`あと ${d} 分`,c:'cd-ok'};
}

function badgeCls(t){ return t==='各停'?'local':t==='通快'?'tkinkai':'rapid'; }

      <div class="dest-col">

        <div class="dest-via">${VIA[t.dest]||''}</div>
      </div>
      <div class="time-col">
        <div class="dep-time">${hh}:${mm}</div>
        ${i===0?`<div class="countdown ${cd.c}">${cd.t}</div>`:''}
      </div>
    </div>`;
  }).join('');
}

function setDir(d){
  if(dir===d) return;
  dir=d;
  const el=document.getElementById('trainList');
  el.classList.add('fade');
  setTimeout(()=>{ renderTrains(); el.classList.remove('fade'); },180);
  document.getElementById('btnUp').classList.toggle('active',d===0);
  document.getElementById('btnDown').classList.toggle('active',d===1);
}

// ── 時計 ─────────────────────────────────────────
function updateClock(){
  const n=new Date();
  const hh=String(n.getHours()).padStart(2,'0');
  const mm=String(n.getMinutes()).padStart(2,'0');
  const ss=String(n.getSeconds()).padStart(2,'0');
  document.getElementById('clockHM').textContent=`${hh}:${mm}`;
  document.getElementById('clockS').textContent=`:${ss}`;
  const days=['日','月','火','水','木','金','土'];
  document.getElementById('clockDate').textContent=
    `${n.getFullYear()}.${String(n.getMonth()+1).padStart(2,'0')}.${String(n.getDate()).padStart(2,'0')} ${days[n.getDay()]} ${isWD()?'平日':'土休日'}`;
}

// ── 運行情報 ──────────────────────────────────────
async function fetchStatus(){
  const bar=document.getElementById('statusBar');
  const txt=document.getElementById('statusText');
  const tim=document.getElementById('statusTime');
  try{
    const r=await fetch('https://api.allorigins.win/raw?url='+encodeURIComponent('https://service.twr.co.jp/rinkai/public/information?lang=ja'),{cache:'no-store'});
    const html=await r.text();
    const isNormal=html.includes('平常通り');
    const isDelay=html.includes('遅れ')||html.includes('遅延')||html.includes('中止')||html.includes('見合わせ');
    const tmp=document.createElement('div');
    tmp.innerHTML=html;
    const h1=tmp.querySelector('h1');
    let msg='';
    if(h1){
      let el=h1.nextElementSibling, c=0;
      while(el&&c<5){
        const t=el.textContent.trim().replace(/\s+/g,' ');
        if(t.length>3&&!t.startsWith('■')&&!t.includes('注意')&&!/\d{4}年/.test(t)){msg=t;break;}
        el=el.nextElementSibling; c++;
      }
    }
    if(!msg) msg=isNormal?'平常通り運転しています。':'運行情報あり';
    bar.className='status-banner '+(isDelay?'delay':isNormal?'normal':'loading');
    txt.textContent=msg.slice(0,80);
    const n=new Date();
    tim.textContent=`${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')} 更新`;
  }catch{
    bar.className='status-banner loading';
    txt.textContent='運行情報取得エラー';
    tim.textContent='';
  }
}

// ── スワイプ ──────────────────────────────────────
let tx=0;
const tl=document.getElementById('trainList');
tl.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;},{passive:true});
tl.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-tx;if(Math.abs(dx)>60)setDir(dx<0?1:0);},{passive:true});

// ── 初期化 ────────────────────────────────────────
renderTrains();
updateClock();
fetchStatus();
setInterval(updateClock,1000);
setInterval(renderTrains,20000);
setInterval(fetchStatus,60000);
</script>
